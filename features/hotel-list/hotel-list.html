<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Hotels in Siem Reap, Cambodia | Traveezy</title>

  <!-- SEO: Primary -->
  <meta name="description" content="Browse the best hotels in Siem Reap, Cambodia. Filter by price, rating &amp; amenities to find your perfect stay as a tourist in Cambodia.">
  <meta name="keywords" content="best hotels Siem Reap, Cambodia hotel booking, tourist accommodation Cambodia, Siem Reap hotel list, Cambodia vacation stay">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Traveezy">
  <link rel="canonical" href="https://traveezy.com/hotels">

  <!-- SEO: Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Best Hotels in Siem Reap, Cambodia | Traveezy">
  <meta property="og:description" content="Browse the best hotels in Siem Reap, Cambodia. Filter by price, rating &amp; amenities to find your perfect stay as a tourist in Cambodia.">
  <meta property="og:site_name" content="Traveezy">
  <meta property="og:url" content="https://traveezy.com/hotels">

  <!-- SEO: Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Best Hotels in Siem Reap, Cambodia | Traveezy">
  <meta name="twitter:description" content="Browse the best hotels in Siem Reap, Cambodia. Filter by price, rating &amp; amenities to find your perfect stay as a tourist in Cambodia.">

  <!-- External Libraries -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Shared Design System -->
  <link rel="stylesheet" href="../../shared/variables.css">
  <link rel="stylesheet" href="../../shared/global.css">
  <link rel="stylesheet" href="../../shared/theme.css">
  <link rel="stylesheet" href="../../shared/fonts.css">

  <!-- Shared Components -->
  <link rel="stylesheet" href="../../components/navbar/navbar.css">
  <link rel="stylesheet" href="../../components/footer/footer.css">

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <!-- Navbar — loaded automatically by main.js -->
  <div id="navbar-container"></div>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-inner">
      <h1>Find Your<br>Perfect Stay.</h1>
      <p>Book boutique hotels, private villas… tailored for those who travel with taste.</p>
      <button class="btn-booking" id="bookingBtn" data-booking-trigger>
        Booking Now
        <span class="circle"><i class="fa-solid fa-chevron-right"></i></span>
      </button>
    </div>
  </header>

  <!-- TRUST STRIP -->
  <section class="trust-strip">
    <div class="content-wrap py-0">
      <div class="row g-0">
        <div class="col-lg-3 col-6">
          <div class="trust-item">
            <span class="icon-badge"><i class="fa-solid fa-shield-halved"></i></span>
            <div>
              <h6>Verified Stays</h6>
              <p>Every listing inspected</p>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-6">
          <div class="trust-item">
            <span class="icon-badge"><i class="fa-solid fa-tag"></i></span>
            <div>
              <h6>Best Price</h6>
              <p>Guaranteed low rates</p>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-6">
          <div class="trust-item">
            <span class="icon-badge"><i class="fa-solid fa-headset"></i></span>
            <div>
              <h6>24/7 Support</h6>
              <p>Always here to help</p>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-6">
          <div class="trust-item">
            <span class="icon-badge"><i class="fa-solid fa-hand-holding-heart"></i></span>
            <div>
              <h6>Free Cancellation</h6>
              <p>Plans change, we get it</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- MAIN -->
  <main class="content-wrap">
    <div class="row">

      <!-- FILTERS -->
      <aside class="col-lg-3 col-md-4 mb-4">
        <div class="filter-title"><i class="fa-solid fa-sliders"></i> Property Type</div>

        <label class="filter-check">
          <input type="checkbox" class="type-filter" value="Hotels">
          <span class="type-icon"><i class="fa-solid fa-hotel"></i></span>
          Hotels
        </label>
        <label class="filter-check">
          <input type="checkbox" class="type-filter" value="Apartments">
          <span class="type-icon"><i class="fa-solid fa-building"></i></span>
          Apartments
        </label>
        <label class="filter-check">
          <input type="checkbox" class="type-filter" value="Villas">
          <span class="type-icon"><i class="fa-solid fa-house-chimney"></i></span>
          Villas
        </label>
        <label class="filter-check">
          <input type="checkbox" class="type-filter" value="Vacation Homes">
          <span class="type-icon"><i class="fa-solid fa-umbrella-beach"></i></span>
          Vacation Homes
        </label>
      </aside>

      <!-- LISTINGS -->
      <section class="col-lg-9 col-md-8">
        <div class="results-bar">
          <div class="results-count"><i class="fa-solid fa-list-check"></i> <span id="resultsCount">6</span> stays found
          </div>
          <div class="sort-select">
            <i class="fa-solid fa-arrow-up-wide-short"></i>
            <select id="sortSelect">
              <option value="default">Sort: Recommended</option>
              <option value="low">Price: Low to High</option>
              <option value="high">Price: High to Low</option>
              <option value="rating">Top Rated</option>
            </select>
          </div>
        </div>
        <div id="listingContainer"></div>
      </section>

    </div>
  </main>

  <!-- Footer — loaded automatically by main.js -->
  <div id="footer-container"></div>

  <!-- Scripts — always at the bottom -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../components/navbar/navbar.js"></script>
  <script src="../../components/footer/footer.js"></script>
  <script src="../../shared/main.js"></script>
  <script src="script.js"></script>

</body>

</html>
